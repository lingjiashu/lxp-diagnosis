<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LXP Diagnosis - 逆变器故障诊断系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
:root {
  --bg-page: #0f1117;
  --bg-card: #161822;
  --bg-hover: #1e2130;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-dim: #8b8fa3;
  --accent: #4da6ff;
  --accent-dim: #2d6bb8;
  --green: #4caf50;
  --orange: #ff9800;
  --red: #ef5350;
  --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg-page)}
a{color:var(--accent);text-decoration:none}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;color:#fff;background:var(--accent-dim);
}
.btn:hover{background:var(--accent);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:#ffffff14;border:1px solid rgba(255,255,255,.15)}
.btn-outline:hover{background:#ffffff24}
.btn-sm{padding:6px 14px;font-size:12px}
.app-layout{max-width:1100px;margin:0 auto;padding:24px 32px}
.hero{
  background:linear-gradient(135deg,#0c0e14,#1a1f30);
  border:1px solid var(--border);border-radius:16px;padding:40px 44px;margin-bottom:24px;
}
.hero h1{font-size:24px;color:#fff;margin-bottom:8px}
.hero p{font-size:13px;color:#ffffff73}
.card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;padding:24px;margin-bottom:16px;
}
.card-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:16px}
.upload-area{display:flex;flex-direction:column;gap:14px}
.upload-box{
  display:flex;flex-direction:column;gap:8px;padding:18px;
  border:1px dashed #3a4054;border-radius:12px;background:#ffffff06;
  cursor:pointer;transition:all .2s;
}
.upload-box:hover{border-color:var(--accent)}
.upload-box.has-file{border-color:var(--green);border-style:solid}
.upload-title{color:#fff;font-weight:700;font-size:13px}
.upload-desc{color:var(--text-dim);font-size:12px}
.upload-file-name{color:var(--green);font-size:12px;margin-top:4px}
input[type=file]{display:none}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;padding:16px;text-align:center;
}
.stat-number{font-size:24px;font-weight:700;color:var(--accent)}
.stat-number.red{color:var(--red)}
.stat-number.orange{color:var(--orange)}
.stat-number.green{color:var(--green)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:4px}
.result-item{
  padding:12px 0;border-bottom:1px solid var(--border);
}
.result-item:last-child{border-bottom:none}
.result-time{font-size:13px;color:var(--accent);font-family:monospace}
.result-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
.result-detail{font-size:12px;color:#ffffff8c;margin-top:4px;line-height:1.6}
.tag{
  display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;
}
.tag-red{background:#ef53501f;color:var(--red)}
.tag-orange{background:#ff98001f;color:var(--orange)}
.tag-green{background:#4caf501f;color:var(--green)}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:8px;font-size:12px;
  background:#ffffff0d;border:1px solid rgba(255,255,255,.1);
  margin:2px 4px 2px 0;
}
.report-content{
  line-height:1.85;font-size:14px;color:var(--text);
}
.report-content h1{font-size:22px;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.report-content h2{font-size:18px;margin:20px 0 10px;color:var(--accent)}
.report-content h3{font-size:15px;margin:16px 0 8px}
.report-content table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.report-content th{background:var(--bg-hover);padding:8px 10px;text-align:left;font-size:11px}
.report-content td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px}
.report-content code{background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-size:12px}
.report-content blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:#4da6ff0d;border-radius:0 6px 6px 0}
.report-content hr{margin:20px 0;border-color:var(--border)}
.report-content ul, .report-content ol{padding-left:20px}
.loading{text-align:center;padding:40px;color:var(--text-dim)}
.error{background:#ef53501a;border:1px solid #ef53504d;border-radius:10px;padding:14px 18px;color:#ffb8b8;font-size:13px}
.empty{text-align:center;padding:40px;color:var(--text-dim);font-size:13px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{
  padding:8px 16px;border-radius:8px 8px 0 0;font-size:13px;cursor:pointer;
  color:var(--text-dim);transition:all .2s;border:1px solid transparent;
  border-bottom:none;margin-bottom:-1px;
}
.tab:hover{color:#fff}
.tab.active{color:var(--accent);background:var(--bg-card);border-color:var(--border)}
.event-row{display:flex;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px;background:#ffffff06;font-size:12px;align-items:center}
.event-row.fault{background:#ef53501a;border-left:3px solid var(--red)}
.event-row.notice{background:#ff980014;border-left:3px solid var(--orange)}
</style>
</head>
<body>
<div id="app">
  <div class="app-layout">
    <!-- Hero -->
    <section class="hero">
      <h1>🔬 LXP 逆变器故障诊断系统</h1>
      <p>上传逆变器运行数据，自动扫描强故障特征，关联事件与操作记录，生成故障分析报告</p>
    </section>

    <!-- Upload Section -->
    <div class="card">
      <div class="card-title">📂 数据上传</div>
      <div class="upload-area">
        <!-- Historical (required) -->
        <label class="upload-box" :class="{'has-file': files.historical}">
          <span class="upload-title">📊 历史运行数据（必填）</span>
          <span class="upload-desc">支持 .xls / .xlsx，逆变器监控导出的逐日历史数据</span>
          <span class="upload-file-name" v-if="files.historical">{{ files.historical.name }}</span>
          <input type="file" accept=".xls,.xlsx" @change="onFileChange('historical', $event)">
        </label>
        <!-- Event (optional) -->
        <label class="upload-box" :class="{'has-file': files.event}">
          <span class="upload-title">📋 事件记录（可选）</span>
          <span class="upload-desc">EVENT 导出文件，包含 Fault/Notice 事件时间线</span>
          <span class="upload-file-name" v-if="files.event">{{ files.event.name }}</span>
          <input type="file" accept=".xls,.xlsx" @change="onFileChange('event', $event)">
        </label>
        <!-- Settings (optional) -->
        <label class="upload-box" :class="{'has-file': files.settings}">
          <span class="upload-title">⚙️ 操作设置记录（可选）</span>
          <span class="upload-desc">SET_RECORD 导出文件，包含参数修改历史</span>
          <span class="upload-file-name" v-if="files.settings">{{ files.settings.name }}</span>
          <input type="file" accept=".xls,.xlsx" @change="onFileChange('settings', $event)">
        </label>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
        <button class="btn" @click="runDiagnosis" :disabled="loading || !files.historical">
          {{ loading ? '⏳ 分析中...' : '🔍 开始诊断' }}
        </button>
        <button class="btn btn-outline btn-sm" @click="clearAll" :disabled="loading">清空</button>
      </div>
      <div v-if="error" class="error" style="margin-top:12px">{{ error }}</div>
    </div>

    <!-- Fault Code 转换器 -->
    <div class="card">
      <div class="card-title">🔢 Fault Code 转换器</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input 
          v-model="faultCodeInput" 
          placeholder="输入 fault code，如 3F3C 或 0x3F3C" 
          style="flex:1;min-width:200px;padding:10px 14px;background:#11141d;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:monospace;outline:none"
          @keyup.enter="parseFaultCode"
        >
        <button class="btn btn-sm" @click="parseFaultCode">转换</button>
      </div>
      <div v-if="faultCodeResult" style="margin-top:12px">
        <div v-if="faultCodeResult.error" class="error">{{ faultCodeResult.error }}</div>
        <template v-else>
          <div style="font-family:monospace;font-size:20px;color:var(--accent);margin-bottom:8px">
            {{ faultCodeResult.hex }} → <strong>{{ faultCodeResult.binary }}</strong>
          </div>
          <div style="font-size:14px;color:var(--text);margin-bottom:8px">
            解析：<strong style="color:var(--red)">{{ faultCodeResult.fault_summary || '无异常' }}</strong>
          </div>
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead>
              <tr style="background:var(--bg-hover)">
                <th style="padding:4px 8px;text-align:left">Bit</th>
                <th style="padding:4px 8px;text-align:left">名称</th>
                <th style="padding:4px 8px;text-align:center">值</th>
                <th style="padding:4px 8px;text-align:left">状态</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="b in faultCodeResult.bits" style="border-bottom:1px solid rgba(255,255,255,.04)" :style="b.value ? {background:'#ef53501a'} : {}">
                <td style="padding:4px 8px;font-family:monospace">{{ b.bit }}</td>
                <td style="padding:4px 8px">{{ b.name }}</td>
                <td style="padding:4px 8px;text-align:center;font-family:monospace">{{ b.value }}</td>
                <td style="padding:4px 8px">{{ b.value ? '🔴 异常' : '✅ 正常' }}</td>
              </tr>
            </tbody>
          </table>
        </template>
      </div>
    </div>

    <!-- Results -->
    <template v-if="result">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number">{{ result.summary.total_rows }}</div>
          <div class="stat-label">数据行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" :class="result.summary.violations_critical > 0 ? 'red' : result.summary.violations_warning > 0 ? 'orange' : 'green'">
            {{ result.summary.violations_total }}
          </div>
          <div class="stat-label">
            异常点 
            <span v-if="result.summary.violations_critical > 0" class="tag tag-red">{{ result.summary.violations_critical }} 严重</span>
            <span v-if="result.summary.violations_warning > 0" class="tag tag-orange">{{ result.summary.violations_warning }} 警告</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-number">{{ result.summary.transitions_count }}</div>
          <div class="stat-label">Fault 突变</div>
        </div>
        <div class="stat-card" v-if="result.summary.events">
          <div class="stat-number" :class="result.summary.events.fault_count > 0 ? 'red' : ''">
            {{ result.summary.events.fault_count }}
          </div>
          <div class="stat-label">Fault 事件</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab" :class="{active: activeTab==='violations'}" @click="activeTab='violations'">⚡ 异常时间点</div>
        <div class="tab" :class="{active: activeTab==='timeline'}" @click="activeTab='timeline'">📅 事件时间线</div>
        <div class="tab" :class="{active: activeTab==='field_changes'}" @click="activeTab='field_changes'">🔧 字段变化</div>
        <div class="tab" :class="{active: activeTab==='transitions'}" @click="activeTab='transitions'" v-if="correlated.length">🔄 故障关联</div>
        <div class="tab" :class="{active: activeTab==='events'}" @click="activeTab='events'" v-if="result.summary.events">📋 事件记录</div>
        <div class="tab" :class="{active: activeTab==='report'}" @click="activeTab='report'">📄 诊断报告</div>
      </div>

      <!-- Violations Tab -->
      <div class="card" v-if="activeTab==='violations'">
        <div class="card-title">⚡ 物理判据异常时间点（{{ result.violations.length }} 个）</div>
        <div v-if="!result.violations.length" class="empty">✅ 未发现物理判据违反，硬件状态正常。</div>
        <!-- Pre-anomaly rows -->
        <template v-if="result.violations.length && result.violations[0].pre_rows">
          <div style="font-size:14px;color:var(--accent);margin-bottom:8px;margin-top:12px">📊 最早异常前运行数据：</div>
          <div v-for="(pr, j) in result.violations[0].pre_rows" class="result-item" style="border-left:2px solid var(--border);padding-left:12px;opacity:0.8">
            <div class="result-time" style="color:var(--text-dim)">🕐 {{ pr.time }} | {{ pr.status }}</div>
            <div class="result-meta">
              SOC: {{ pr.SOC }}% | BatCurrent: {{ pr.BatCurrent }}A |
              pCharge: {{ pr.pCharge }}W | pDisCharge: {{ pr.pDisCharge }}W |
              vpv1: {{ pr.vpv1 }}V | vpv2: {{ pr.vpv2 }}V | vpv3: {{ pr.vpv3 }}V |
              ppv1: {{ pr.ppv1 }}W | ppv2: {{ pr.ppv2 }}W | ppv3: {{ pr.ppv3 }}W |
              vacr: {{ pr.vacr }}V | fac: {{ pr.fac }}Hz |
              pToGrid: {{ pr.pToGrid }}W | pToUser: {{ pr.pToUser }}W | pLoad: {{ pr.pLoad }}W |
              vBusP: {{ pr.vBusP }}V | vBus1: {{ pr.vBus1 }}V | vBus2: {{ pr.vBus2 }}V
            </div>
          </div>
        </template>
        <div v-for="(v, i) in paginatedViolations" :key="i" class="result-item">
          <div class="result-time">
            <span :class="v.severity==='critical' ? 'tag tag-red' : 'tag tag-orange'">
              {{ v.severity==='critical' ? '🔴 严重' : '🟡 警告' }}
            </span>
            {{ v.time }}
            <span style="margin-left:8px;font-size:11px">Fault: {{ v.fault_code }} | Warn: {{ v.warning_code }} | {{ v.status }}</span>
          </div>
          <div v-for="r in v.violations" class="result-detail">
            • {{ r.detail }}
            <span v-if="r.inference" style="color:var(--orange);margin-left:12px">⚠️ {{ r.inference }}</span>
          </div>
          <div v-if="v.internal_fault" class="result-detail" style="color:var(--accent);font-family:monospace">
            🔍 Internal Fault: {{ v.internal_fault.hex }} → {{ v.internal_fault.binary }} → {{ v.internal_fault.fault_summary }}
          </div>
          <div class="result-meta">
            SOC: {{ v.metrics.SOC }}% | 
            BatCurrent: {{ v.metrics.BatCurrent }}A |
            pCharge: {{ v.metrics.pCharge }}W |
            pDisCharge: {{ v.metrics.pDisCharge }}W |
            vpv1: {{ v.metrics.vpv1 }}V |
            vpv2: {{ v.metrics.vpv2 }}V |
            vpv3: {{ v.metrics.vpv3 }}V |
            ppv1: {{ v.metrics.ppv1 }}W |
            ppv2: {{ v.metrics.ppv2 }}W |
            ppv3: {{ v.metrics.ppv3 }}W |
            vacr: {{ v.metrics.vacr }}V |
            fac: {{ v.metrics.fac }}Hz |
            pToGrid: {{ v.metrics.pToGrid }}W |
            pToUser: {{ v.metrics.pToUser }}W |
            pLoad: {{ v.metrics.pLoad }}W |
            vBusP: {{ v.metrics.vBusP }}V |
            vBus1: {{ v.metrics.vBus1 }}V |
            vBus2: {{ v.metrics.vBUS2 }}V
          </div>
        </div>
        <div v-if="result.violations.length > 20" style="margin-top:12px;text-align:center">
          <button class="btn btn-sm btn-outline" @click="showMoreViolations">
            {{ violationsPage * 20 >= result.violations.length ? '收起' : '加载更多...' }}
          </button>
        </div>
      </div>

      <!-- Transitions / Correlated Tab -->
      <div class="card" v-if="activeTab==='transitions'">
        <div class="card-title">🔄 故障突变关联分析</div>
        <div v-if="!correlated.length" class="empty">未检测到 fault code 突变。</div>
        <div v-for="(corr, i) in correlated" :key="i" style="margin-bottom:20px;padding:16px;background:#ffffff04;border-radius:10px">
          <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:8px">
            ⚡ 突变：{{ corr.from_code }} → {{ corr.to_code }}
          </div>
          <div class="result-meta" style="margin-bottom:10px;">时间：{{ corr.transition_time }}</div>
          
          <!-- Related Events -->
          <div v-if="corr.related_events && corr.related_events.length">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">关联事件：</div>
            <div v-for="evt in corr.related_events.slice(0,5)" class="event-row" :class="evt.type === 'Fault' ? 'fault' : 'notice'">
              <span style="min-width:60px">{{ evt.direction === 'before' ? '←' : '→' }} {{ Math.abs(evt.time_diff_minutes) }}min</span>
              <span>{{ evt.type === 'Fault' ? '🔴' : '🟡' }} {{ evt.event }}</span>
              <span style="font-size:11px;color:var(--text-dim);margin-left:auto">{{ evt.start_time?.slice(0,19) }}</span>
            </div>
          </div>

          <!-- Related Settings -->
          <div v-if="corr.related_settings && corr.related_settings.length">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;margin-top:10px">关联操作设置：</div>
            <div v-for="s in corr.related_settings.slice(0,5)" class="event-row">
              <span style="min-width:60px">{{ s.direction === 'before' ? '←' : '→' }} {{ Math.abs(s.time_diff_minutes) }}min</span>
              <span>{{ s.result === 'Success' ? '✅' : '❌' }} {{ s.parameter }} = {{ s.value }}</span>
              <span style="font-size:11px;color:var(--text-dim);margin-left:auto">{{ s.username }}</span>
            </div>
          </div>

          <!-- Data Window -->
          <div v-if="corr.window_before && corr.window_after" style="margin-top:10px">
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">突变前后数据：</div>
            <div style="overflow-x:auto">
              <table style="width:100%;font-size:11px;border-collapse:collapse">
                <thead>
                  <tr style="background:var(--bg-hover)">
                    <th style="padding:4px 8px;text-align:left">方向</th>
                    <th style="padding:4px 8px;text-align:left">时间</th>
                    <th style="padding:4px 8px;text-align:right">vBat</th>
                    <th style="padding:4px 8px;text-align:right">Vbat_Inv</th>
                    <th style="padding:4px 8px;text-align:right">vBus2</th>
                    <th style="padding:4px 8px;text-align:right">vBus1</th>
                    <th style="padding:4px 8px;text-align:right">vBusP</th>
                    <th style="padding:4px 8px;text-align:right">SOC</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="r in corr.window_before.slice(-3)" style="border-bottom:1px solid rgba(255,255,255,.04)">
                    <td style="padding:3px 8px;color:var(--orange)">◀ 前</td>
                    <td style="padding:3px 8px;font-family:monospace;font-size:10px">{{ r.time?.slice(5,19) }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBat }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.Vbat_Inv }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBUS2 }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBus1 }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBusP }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.SOC }}%</td>
                  </tr>
                  <tr v-for="r in corr.window_after.slice(0,3)" style="border-bottom:1px solid rgba(255,255,255,.04)">
                    <td style="padding:3px 8px;color:var(--red)">▶ 后</td>
                    <td style="padding:3px 8px;font-family:monospace;font-size:10px">{{ r.time?.slice(5,19) }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBat }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.Vbat_Inv }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBUS2 }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBus1 }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.vBusP }}</td>
                    <td style="padding:3px 8px;text-align:right">{{ r.SOC }}%</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Timeline Tab -->
      <div class="card" v-if="activeTab==='timeline'">
        <div class="card-title">📅 事件时间线（{{ result.event_timeline?.length || 0 }} 个事件）</div>
        <div v-if="!result.event_timeline?.length" class="empty">无事件记录</div>
        <div v-for="(evt, i) in (result.event_timeline || [])" :key="i" class="event-row" :class="evt.type.includes('fault') ? 'fault' : evt.type.includes('warning') ? 'notice' : ''">
          <span style="min-width:160px;font-family:monospace;font-size:12px;color:var(--accent)">{{ evt.time }}</span>
          <span :class="evt.type==='status_change' ? 'tag' : evt.type.includes('fault') ? 'tag tag-red' : 'tag tag-orange'">{{ evt.type }}</span>
          <span style="flex:1;font-size:13px">{{ evt.detail }}</span>
        </div>
      </div>

      <!-- Field Changes Tab -->
      <div class="card" v-if="activeTab==='field_changes'">
        <div class="card-title">🔧 诊断字段变化</div>
        
        <!-- batStatusInv -->
        <div style="margin-bottom:20px">
          <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:10px">🔋 逆变器电池状态 (batStatusInv)</div>
          <div v-if="!(result.field_changes?.batStatusInv?.length)" class="empty">无变化</div>
          <div v-for="(chg, i) in (result.field_changes?.batStatusInv || [])" :key="'bat'+i" style="padding:10px 14px;margin-bottom:6px;background:#ffffff06;border-radius:8px;border-left:2px solid var(--accent)">
            <div style="font-size:12px;color:var(--accent);font-family:monospace;margin-bottom:4px">{{ chg.time }}</div>
            <div style="font-size:12px;color:var(--text-dim)">
              <span style="font-family:monospace">{{ chg.prev_hex }}</span> → <span style="font-family:monospace;color:#fff">{{ chg.curr_hex }}</span>
              <span style="margin-left:8px;font-size:11px;color:#ffffff80">{{ chg.curr_binary }}</span>
            </div>
            <div style="font-size:12px;margin-top:2px">
              <span style="color:#ffffff80">变化: </span>
              <span v-for="b in chg.changed_bits" style="margin-right:8px">
                {{ b.name }} {{ b.from }}→<strong :style="b.to?'color:var(--red)':'color:var(--green)'">{{ b.to }}</strong>
              </span>
              <span v-if="!chg.changed_bits.length" style="color:var(--text-dim)">仅值变化，bit位相同</span>
            </div>
            <div style="font-size:12px;color:var(--text-dim);margin-top:2px">解析: {{ chg.curr_summary }}</div>
          </div>
        </div>

        <!-- internalFault -->
        <div>
          <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:10px">⚠️ 内部异常 (internalFault)</div>
          <div v-if="!(result.field_changes?.internalFault?.length)" class="empty">无变化</div>
          <div v-for="(chg, i) in (result.field_changes?.internalFault || [])" :key="'if'+i" style="padding:10px 14px;margin-bottom:6px;background:#ffffff06;border-radius:8px;border-left:2px solid var(--orange)">
            <div style="font-size:12px;color:var(--accent);font-family:monospace;margin-bottom:4px">{{ chg.time }}</div>
            <div style="font-size:12px;color:var(--text-dim)">
              <span style="font-family:monospace">{{ chg.prev_hex }}</span> → <span style="font-family:monospace;color:#fff">{{ chg.curr_hex }}</span>
              <span style="margin-left:8px;font-size:11px;color:#ffffff80">{{ chg.curr_binary }}</span>
            </div>
            <div style="font-size:12px;margin-top:2px">
              <span style="color:#ffffff80">变化: </span>
              <span v-for="b in chg.changed_bits" style="margin-right:8px">
                {{ b.name }} {{ b.from }}→<strong :style="b.to?'color:var(--red)':'color:var(--green)'">{{ b.to }}</strong>
              </span>
              <span v-if="!chg.changed_bits.length" style="color:var(--text-dim)">仅值变化，bit位相同</span>
            </div>
            <div style="font-size:12px;color:var(--text-dim);margin-top:2px">解析: {{ chg.curr_summary }}</div>
          </div>
        </div>
      </div>

      <!-- Events Tab -->
      <div class="card" v-if="activeTab==='events' && result.summary.events">
        <div class="card-title">📋 全部事件记录</div>
        <div v-for="(evt, i) in eventList" :key="i" class="event-row" :class="evt.type === 'Fault' ? 'fault' : 'notice'">
          <span :class="evt.type === 'Fault' ? 'tag tag-red' : 'tag tag-orange'">{{ evt.type }}</span>
          <span style="flex:1">{{ evt.event }}</span>
          <span style="font-size:11px;color:var(--text-dim)">{{ evt.start_time?.slice(0,19) || '?' }} — {{ evt.recovered_time?.slice(0,19) || '未恢复' }}</span>
        </div>
      </div>

      <!-- Report Tab -->
      <div class="card" v-if="activeTab==='report'">
        <div class="card-title">📄 故障分析报告</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn btn-sm" @click="copyReport">📋 复制 Markdown</button>
          <button class="btn btn-sm btn-outline" @click="downloadReport">💾 下载 .md</button>
        </div>
        <div class="report-content" v-html="reportHtml"></div>
      </div>
    </template>
  </div>
</div>

<script>
const { createApp, ref, computed, reactive } = Vue;

createApp({
  setup() {
    const files = reactive({ historical: null, event: null, settings: null });
    const loading = ref(false);
    const error = ref('');
    const result = ref(null);
    const activeTab = ref('violations');
    const violationsPage = ref(1);
    const correlated = ref([]);
    const eventList = ref([]);
    const faultCodeInput = ref('');
    const faultCodeResult = ref(null);

    const FAULT_BITS = {
      0: 'GFCI故障', 1: '硬件过流', 2: '逆变过流', 3: 'Boost过流',
      4: 'BDC过流', 5: 'BUS短路', 6: 'Bypass继电器故障',
    };

    function parseFaultCode() {
      const raw = faultCodeInput.value.trim();
      if (!raw) { faultCodeResult.value = { error: '请输入 fault code' }; return; }
      try {
        let dec;
        const s = raw.replace(/^0x/i, '');
        if (!/^[0-9a-fA-F]+$/.test(s)) throw new Error('无效HEX');
        dec = parseInt(s, 16);
        const hex = '0x' + s.toUpperCase();
        const binary = dec.toString(2).padStart(16, '0');
        const bits = [];
        const faults = [];
        for (let b = 0; b < 16; b++) {
          const name = FAULT_BITS[b];
          if (name) {
            const val = (dec >> b) & 1;
            bits.push({ bit: b, name, value: val });
            if (val) faults.push(name);
          }
        }
        faultCodeResult.value = {
          hex, binary, bits,
          fault_summary: faults.length ? faults.join('、') : '无异常',
        };
      } catch (e) {
        faultCodeResult.value = { error: '格式错误，请输入有效HEX，如 3F3C 或 0x3F3C' };
      }
    }

    function onFileChange(type, e) {
      const f = e.target.files[0];
      if (f) files[type] = f;
    }

    async function runDiagnosis() {
      if (!files.historical) return;
      loading.value = true;
      error.value = '';
      result.value = null;

      try {
        const form = new FormData();
        form.append('historical', files.historical);
        if (files.event) form.append('event', files.event);
        if (files.settings) form.append('settings', files.settings);

        // 添加超时（120秒，大文件处理需要时间）
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 120000);

        const resp = await fetch('/api/diagnose', { 
          method: 'POST', 
          body: form,
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        if (!resp.ok) {
          const errText = await resp.text().catch(() => '未知错误');
          error.value = `服务器错误 (${resp.status}): ${errText}`;
          return;
        }

        const data = await resp.json();

        if (!data.success) {
          error.value = data.error || '诊断失败';
          return;
        }

        result.value = data;
        correlated.value = data.correlated || [];
        eventList.value = data.summary?.events?._raw_events || [];
        activeTab.value = data.violations?.length ? 'violations' : 'report';
      } catch (e) {
        if (e.name === 'AbortError') {
          error.value = '诊断超时（>2分钟）。文件可能太大，请检查网络后重试。';
        } else {
          error.value = '请求失败: ' + (e.message || '网络错误，请检查连接后重试');
        }
      } finally {
        loading.value = false;
      }
    }

    const paginatedViolations = computed(() => {
      if (!result.value?.violations) return [];
      return result.value.violations.slice(0, violationsPage.value * 20);
    });

    function showMoreViolations() {
      if (!result.value) return;
      const max = Math.ceil(result.value.violations.length / 20);
      if (violationsPage.value >= max) {
        violationsPage.value = 1;
      } else {
        violationsPage.value++;
      }
    }

    function clearAll() {
      files.historical = null;
      files.event = null;
      files.settings = null;
      result.value = null;
      error.value = '';
      correlated.value = [];
      eventList.value = [];
      violationsPage.value = 1;
      // Reset file inputs
      document.querySelectorAll('input[type=file]').forEach(el => el.value = '');
    }

    // Simple markdown renderer
    function renderMarkdown(md) {
      if (!md) return '';
      // Split into blocks by double newline
      const blocks = md.split('\n\n');
      let html = '';
      let inTable = false;
      
      for (const block of blocks) {
        const lines = block.split('\n');
        const firstLine = lines[0];
        
        // Headers
        if (/^#### /.test(firstLine)) { html += `<h4>${firstLine.slice(5)}</h4>`; continue; }
        if (/^### /.test(firstLine)) { html += `<h3>${firstLine.slice(4)}</h3>`; continue; }
        if (/^## /.test(firstLine)) { html += `<h2>${firstLine.slice(3)}</h2>`; continue; }
        if (/^# /.test(firstLine)) { html += `<h1>${firstLine.slice(2)}</h1>`; continue; }
        
        // Horizontal rule
        if (firstLine === '---') { html += '<hr>'; continue; }
        
        // Blockquote
        if (firstLine.startsWith('> ')) {
          html += `<blockquote>${firstLine.slice(2)}</blockquote>`;
          continue;
        }
        
        // Table
        const trimmed = firstLine.trim();
        if (trimmed.startsWith('|')) {
          if (!inTable) { html += '<table>'; inTable = true; }
          // Process ALL lines in this table block
          for (const line of lines) {
            const t = line.trim();
            if (!t.startsWith('|')) continue;
            const isSep = /^[\|\s\-:]+$/.test(t.replace(/\|/g, '').trim());
            if (isSep) continue;
            html += '<tr>';
            let cellStr = t.replace(/^\|/, '').replace(/\|$/, '');
            const cells = cellStr.split('|').map(c => c.trim());
            for (const cell of cells) {
              html += `<td>${cell}</td>`;
            }
            html += '</tr>';
          }
          continue;
        } else if (inTable) {
          html += '</table>';
          inTable = false;
        }
        
        // Inline formatting within the block
        let content = block
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n/g, '<br>');
        
        html += `<p>${content}</p>`;
      }
      
      if (inTable) html += '</table>';
      return html;
    }

    const reportHtml = computed(() => {
      if (!result.value?.report) return '';
      return renderMarkdown(result.value.report);
    });

    function copyReport() {
      if (result.value?.report) {
        navigator.clipboard.writeText(result.value.report);
      }
    }

    function downloadReport() {
      if (!result.value?.report) return;
      const blob = new Blob([result.value.report], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const sn = result.value.summary?.serial_number || 'unknown';
      a.download = `LXP-Diagnosis-${sn}-report.md`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    return {
      files, loading, error, result, activeTab, violationsPage,
      correlated, eventList, paginatedViolations,
      faultCodeInput, faultCodeResult, parseFaultCode,
      reportHtml,
      onFileChange, runDiagnosis, showMoreViolations, clearAll,
      copyReport, downloadReport,
    };
  }
}).mount('#app');
</script>
</body>
</html>
